version: '3.8'

services:
  hms-web:
    build: .
    ports:
      - "8002:80"
    volumes:
      - .:/var/www/html/
    depends_on:
      - hms-db
    container_name: hms-web-container
    environment:
      - DB_HOST=hms-db
      - DB_USER=hms_user
      - DB_PASS=hms_pass
      - DB_NAME=hospital_db
    restart: unless-stopped

  hms-db:
    image: mysql:8.0
    container_name: hms-db-container
    command: --default-authentication-plugin=mysql_native_password
    environment:
      - MYSQL_DATABASE=hospital_db
      - MYSQL_USER=hms_user
      - MYSQL_PASSWORD=hms_pass
      - MYSQL_ROOT_PASSWORD=root_pass
    ports:
      - "3306:3306"
    volumes:
      - hms-db-data:/var/lib/mysql
    restart: unless-stopped

volumes:
  hms-db-data:
